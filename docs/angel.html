<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel · English Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #faf7f2; --paper: #fffef9; --ink: #1a1209; --accent: #7d3c98; --accent2: #e8d5f5; --border: #d4c4b0; }
  /* 樣式延用 Angel 專屬紫色風格... (與 Tony 結構一致，顏色不同) */
  body { font-family: 'Source Serif 4', serif; background: var(--bg); color: var(--ink); padding: 0; margin: 0; }
  header { background: var(--ink); color: #fff; padding: 24px; border-bottom: 4px solid var(--accent); }
  .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>Angel · Lifestyle & Culture</h1>
  <button class="btn-primary" onclick="generateArticle()">✨ 產生新文章</button>
</header>
<main style="max-width: 800px; margin: 40px auto; padding: 20px;">
  <div id="loading" style="display:none;">🌺 正在為您挑選優雅的文章...</div>
  <div id="article-display">
    <h2 id="title" style="font-family:'Playfair Display'; font-size: 32px;"></h2>
    <div id="body" style="font-size: 18px; margin-top: 20px; white-space: pre-wrap;"></div>
  </div>
</main>
<script>
function getApiKey() { return localStorage.getItem('gemini_api_key') || prompt("請輸入 API Key："); }

async function generateArticle() {
  const key = getApiKey(); if(!key) return;
  document.getElementById('loading').style.display = 'block';
  const prompt = "You are an English teacher. Generate a B2-C1 article for Angel. Topics: Culture, Health, Travel...";
  
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const d = await res.json();
    const txt = d.candidates[0].content.parts[0].text;
    document.getElementById('body').textContent = txt;
    // 儲存進度
    const s = JSON.parse(localStorage.getItem('flpt_angel') || '{"count":0,"totalQ":0,"correctQ":0}');
    s.count++; localStorage.setItem('flpt_angel', JSON.stringify(s));
  } finally { document.getElementById('loading').style.display = 'none'; }
}
</script>
</body>
</html>
