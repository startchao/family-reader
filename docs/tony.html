<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony · FLPT Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #faf7f2; --paper: #fffef9; --ink: #1a1209; --muted: #6b5e4e; --accent: #c0392b; --accent2: #e8d5c4; --border: #d4c4b0; --success: #27ae60; --warn: #e67e22; --code-bg: #f0ebe3; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Serif 4', Georgia, serif; background: var(--bg); color: var(--ink); min-height: 100vh; line-height: 1.7; }
  header { background: var(--ink); color: #fff; padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--accent); position: sticky; top: 0; z-index: 100; }
  .header-content h1 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; }
  .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit; }
  main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
  .article-card { background: var(--paper); border: 1px solid var(--border); padding: 40px; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
  .translation-content { display: none; margin-top: 20px; padding: 20px; background: var(--code-bg); border-radius: 8px; font-style: italic; }
  .translation-content.visible { display: block; }
  .quiz-section { margin-top: 40px; border-top: 2px solid var(--border); padding-top: 30px; }
  .option-btn { display: block; width: 100%; text-align: left; padding: 12px 16px; margin: 8px 0; border: 1px solid var(--border); background: white; border-radius: 6px; cursor: pointer; }
  .option-btn:hover { background: var(--accent2); }
  .loading { display: none; text-align: center; padding: 40px; font-style: italic; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <h1>Tony · FLPT Reader</h1>
    <p style="font-size: 13px; color: var(--border);">B2–C1 · Geopolitics & Military</p>
  </div>
  <button class="btn-primary" id="btn-gen" onclick="generateArticle()">✨ 生成新文章</button>
</header>

<main>
  <div id="loading" class="loading">☕ 正在為您撰寫深度分析文章，請稍候約 20 秒...</div>
  <div id="article-display" style="display: none;">
    <article class="article-card">
      <h2 id="article-title" style="font-family:'Playfair Display'; font-size: 32px; margin-bottom: 24px;"></h2>
      <div id="article-body" style="font-size: 19px; white-space: pre-wrap;"></div>
      
      <div style="margin-top: 30px; display: flex; gap: 10px;">
        <button class="btn-primary" style="background:var(--ink);" id="btn-toggle-zh" onclick="toggleTranslation()">🈶 顯示翻譯</button>
        <button class="btn-primary" style="background:var(--muted);" onclick="downloadMD()">💾 下載存檔</button>
      </div>
      
      <div id="translation-wrap" class="translation-content"></div>
    </article>

    <section class="quiz-section" id="quiz-area"></section>
  </div>
</main>

<script>
let currentData = null;

function getApiKey() {
  return localStorage.getItem('gemini_api_key') || prompt("尚未設定 API Key，請輸入：");
}

const PROMPT = `You are an expert FLPT tutor. Generate a B2-C1 level English reading article for a military officer.
Topics: geopolitics, military technology, international security.
Format requirements:
===TITLE===
[Title]
===ARTICLE===
[350-400 words English article]
===TRANSLATION===
[Traditional Chinese Translation]
===VOCAB===
word|ipa|definition|chinese|example
===QUIZ===
Q1: Question
A) Option
B) Option
C) Option
D) Option
Answer: A
Explanation: ...`;

async function generateArticle() {
  const key = getApiKey(); if(!key) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('article-display').style.display = 'none';

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: PROMPT }] }] })
    });
    const data = await response.json();
    const rawText = data.candidates[0].content.parts[0].text;
    parseAndRender(rawText);
  } catch (e) {
    alert("生成失敗，請檢查 API Key 是否正確。");
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function parseAndRender(raw) {
  const sections = raw.split(/===[A-Z]+===/);
  currentData = {
    title: sections[1]?.trim(),
    body: sections[2]?.trim(),
    zh: sections[3]?.trim()
  };
  document.getElementById('article-title').textContent = currentData.title;
  document.getElementById('article-body').textContent = currentData.body;
  document.getElementById('translation-wrap').textContent = currentData.zh;
  document.getElementById('article-display').style.display = 'block';
  
  // 記錄進度
  const stats = JSON.parse(localStorage.getItem('flpt_tony') || '{"count":0,"totalQ":0,"correctQ":0}');
  stats.count++;
  localStorage.setItem('flpt_tony', JSON.stringify(stats));
}

function toggleTranslation() {
  const wrap = document.getElementById('translation-wrap');
  wrap.classList.toggle('visible');
}

function downloadMD() {
  const blob = new Blob([`# ${currentData.title}\n\n${currentData.body}`], {type: 'text/markdown'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Tony_${new Date().toISOString().slice(0,10)}.md`; a.click();
}
</script>
</body>
</html>
