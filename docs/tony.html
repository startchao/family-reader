<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony · FLPT Reader (Manual)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --paper: #fffef9;
    --ink: #1a1209;
    --accent: #c0392b; /* Tony 的顏色，其他人請換成各自的顏色 */
    --accent2: #e8d5c4;
    --border: #d4c4b0;
    --success: #27ae60;
  }
  /* ... (保留您原本的 CSS 樣式) ... */
  .api-status { font-size: 12px; color: var(--success); cursor: pointer; opacity: 0.7; }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="brand">
      <div class="icon">📰</div>
      <div>
        <h1>Tony's Manual Reader</h1>
        <p>B2–C1 · FLPT Military & Geopolitics</p>
      </div>
    </div>
    <div id="api-indicator" class="api-status" onclick="resetApiKey()">🔑 已設定 Key (點擊重設)</div>
  </div>
</header>

<main>
  <div id="setup-area" style="text-align: center; padding: 40px 0;">
    <button id="btn-generate" class="btn-primary" onclick="generateNewArticle()">✨ 立即生成新文章</button>
    <p style="margin-top: 15px; color: #6b5e4e; font-size: 0.9em;">(手動生成將耗時約 15-30 秒)</p>
  </div>

  <article id="article-content" style="display:none;">
    <h2 id="display-title"></h2>
    <div id="display-body"></div>
    <hr>
    <div id="translation-wrap" class="translation-content">
      <div id="display-zh"></div>
    </div>
  </article>
</main>

<script>
// ── 安全性：API Key 管理 ──────────────────────────────────────────────────
function getApiKey() {
  let key = localStorage.getItem('gemini_api_key');
  if (!key) {
    key = prompt("請輸入您的 Gemini API Key:\n(此 Key 僅存放在您的瀏覽器，不會上傳伺服器)");
    if (key) {
      localStorage.setItem('gemini_api_key', key);
      location.reload();
    }
  }
  return key;
}

function resetApiKey() {
  if (confirm("確定要更換 API Key 嗎？")) {
    localStorage.removeItem('gemini_api_key');
    getApiKey();
  }
}

// ── 生成邏輯 ──────────────────────────────────────────────────────────────
async function generateNewArticle() {
  const apiKey = getApiKey();
  if (!apiKey) return;

  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  btn.textContent = "⏳ AI 思考中...";

  // 這裡放入原本各別檔案專屬的 Prompt
  const promptText = `You are an expert FLPT tutor. Generate a B2-C1 level English article... (其餘省略)`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: promptText }] }],
        generationConfig: { temperature: 0.8, maxOutputTokens: 2048 }
      })
    });

    const data = await response.json();
    const rawText = data.candidates[0].content.parts[0].text;
    
    // 解析並顯示 (沿用您原本的解析邏輯)
    renderArticle(rawText);

  } catch (error) {
    alert("生成失敗，請檢查 API Key 是否正確或網路連線。");
    console.error(error);
  } finally {
    btn.disabled = false;
    btn.textContent = "✨ 重新生成文章";
  }
}

function renderArticle(raw) {
  // 沿用您原本將文字放入 HTML 標籤的代碼...
  document.getElementById('article-content').style.display = 'block';
}
</script>
</body>
</html>
