<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family English Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e8e6e0; --muted: #7a7890; --tony: #c0392b; --angel: #7d3c98; --jill: #16a085; --guan: #2980b9; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Serif 4', serif; background: var(--bg); color: var(--text); padding: 48px 20px 80px; display: flex; flex-direction: column; align-items: center; }
  .hero { text-align: center; margin-bottom: 40px; position: relative; width: 100%; max-width: 960px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 6vw, 40px); margin-bottom: 10px; }
  .settings-btn { position: absolute; top: -20px; right: 0; background: rgba(26,29,39,0.8); border: 1px solid var(--border); color: var(--muted); cursor: pointer; padding: 6px 12px; border-radius: 8px; font-size: 13px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 18px; width: 100%; max-width: 960px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px 20px 18px; text-decoration: none; color: var(--text); position: relative; overflow: hidden; display: block; transition: 0.2s; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--c); }
  .card:hover { transform: translateY(-3px); border-color: #3a3d4a; }
  .section-title { width: 100%; max-width: 960px; font-size: 12px; text-transform: uppercase; color: var(--muted); margin: 32px 0 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .archive { width: 100%; max-width: 960px; background: var(--card); padding: 24px; border-radius: 12px; border: 1px solid var(--border); margin-top: 8px; }
  .archive-item { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); padding: 10px 0; border-bottom: 1px solid var(--border); }
  .archive-links a { text-decoration: none; color: var(--muted); background: var(--bg); padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 12px; margin-left: 5px; }
</style>
</head>
<body>
<div class="hero">
  <button class="settings-btn" onclick="setGlobalKey()">⚙️ 設定 API Key</button>
  <h1>今天要讀英文了嗎？</h1>
  <p>每天自動生成一篇，也可以隨時手動生成新文章</p>
</div>
<div class="section-title">今日自動文章</div>
<div class="cards" id="daily-cards"></div>
<div class="section-title" style="margin-top:40px;">隨時手動生成</div>
<div class="cards" id="manual-cards"></div>
<div class="section-title" style="margin-top:40px;">過去文章存檔</div>
<div class="archive"><ul id="archive-list" style="list-style:none;"></ul></div>
<script>
const TODAY = new Date().toISOString().slice(0,10);
const MEMBERS = [
  { id:'tony', name:'Tony', icon:'📰', badge:'B2-C1 · FLPT', cls:'tony', dkey:'daily_tony', mkey:'flpt_tony', c:'#c0392b' },
  { id:'angel', name:'Angel', icon:'🌸', badge:'B2-C1', cls:'angel', dkey:'daily_angel', mkey:'flpt_angel', c:'#7d3c98' },
  { id:'jill', name:'Jill', icon:'📖', badge:'B2 · 國高中', cls:'jill', dkey:'daily_jill', mkey:'flpt_jill', c:'#16a085' },
  { id:'guan', name:'Guan', icon:'🚀', badge:'A2-B1 · 小學中', cls:'guan', dkey:'daily_guan', mkey:'flpt_guan', c:'#2980b9' }
];
function setGlobalKey() { const k = prompt("輸入 Gemini API Key：", localStorage.getItem('gemini_api_key')||""); if(k!==null){localStorage.setItem('gemini_api_key', k.trim()); alert("設定完成！");} }
const dailyC = document.getElementById('daily-cards'); const manualC = document.getElementById('manual-cards');
MEMBERS.forEach(m => {
  const ds = JSON.parse(localStorage.getItem(m.dkey)||'{"count":0,"totalQ":0,"correctQ":0}');
  const ms = JSON.parse(localStorage.getItem(m.mkey)||'{"count":0,"totalQ":0,"correctQ":0}');
  const createCard = (h, s, isM) => `<a class="card" href="${h}" style="--c:${m.c}"><div>${m.icon}</div><div style="font-size:11px;color:${m.c}">${m.badge}</div><h2>${m.name}</h2><div style="font-size:12px;margin-top:10px;color:var(--muted);">已讀 <strong>${s.count}</strong> · 正確率 <strong>${s.totalQ>0?Math.round(s.correctQ/s.totalQ*100)+'%':'—'}</strong></div></a>`;
  dailyC.insertAdjacentHTML('beforeend', createCard(`${m.id}_${TODAY}.html`, ds));
  manualC.insertAdjacentHTML('beforeend', createCard(`${m.id}.html`, ms));
});
async function buildArchive() {
  const list = document.getElementById('archive-list'); const now = new Date();
  for(let i=0; i<30; i++) {
    const d = new Date(now); d.setDate(d.getDate()-i); const dt = d.toISOString().slice(0,10);
    try { const r = await fetch(`tony_${dt}.html`, {method:'HEAD'}); if(r.ok) {
      const li = `<li class="archive-item"><span>${dt}</span><div class="archive-links">${MEMBERS.map(m=>`<a href="${m.id}_${dt}.html">${m.icon} ${m.name}</a>`).join('')}</div></li>`;
      list.insertAdjacentHTML('beforeend', li);
    }} catch(e){}
  }
}
buildArchive();
</script>
</body>
</html>
