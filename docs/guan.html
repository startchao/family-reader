<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guan's English Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f7ff;
    --paper: #ffffff;
    --ink: #1a2a3a;
    --muted: #5a7a9a;
    --accent: #2980b9;
    --accent-light: #d6eaf8;
    --border: #b8d4ea;
    --success: #27ae60;
    --warn: #e67e22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.75;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 14px rgba(41,128,185,.3);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .level-badge {
    background: #fff;
    color: var(--accent);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  header h1 { font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 800; }
  .stats-bar { display: flex; gap: 18px; font-size: 12px; color: rgba(255,255,255,.8); }
  .stats-bar span strong { color: #fff; }

  .container { max-width: 740px; margin: 0 auto; padding: 28px 18px 80px; }

  .progress-section {
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .progress-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s ease; }
  .progress-count { font-size: 13px; font-weight: 700; white-space: nowrap; color: var(--accent); }

  .controls { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
  button { cursor: pointer; border: none; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; border-radius: 8px; transition: all .18s; }
  .btn-primary { background: var(--accent); color: #fff; padding: 11px 22px; }
  .btn-primary:hover { background: #2471a3; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(41,128,185,.35); }
  .btn-primary:disabled { background: #a9c6e0; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: var(--paper); color: var(--muted); border: 1.5px solid var(--border); padding: 10px 16px; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-secondary:disabled { opacity: .4; cursor: not-allowed; }

  .loading-wrap { text-align: center; padding: 60px 20px; display: none; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap p { color: var(--muted); font-size: 15px; }

  #article-area { display: none; }

  .article-header {
    background: var(--accent);
    color: #fff;
    border-radius: 12px 12px 0 0;
    padding: 20px 24px;
    margin-bottom: 0;
  }
  .article-meta { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; opacity: .8; margin-bottom: 6px; }
  .article-title { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; line-height: 1.3; }

  .section {
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 14px;
  }
  .section:first-of-type { border-radius: 0 0 12px 12px; border-top: none; }
  .section-label {
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent-light);
  }
  .section p { margin-bottom: 12px; font-size: 15.5px; }
  .section p:last-child { margin-bottom: 0; }

  .translation-wrap { display: none; }
  .translation-wrap.visible { display: block; }
  .translation-wrap .section { background: #f0f9ff; }

  .vocab-grid { display: grid; gap: 12px; }
  .vocab-item {
    background: #f8fbff;
    border-radius: 10px;
    padding: 14px 16px;
    border-left: 4px solid var(--accent);
  }
  .vocab-word { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800; color: var(--accent); }
  .vocab-ipa { color: var(--muted); font-size: 13px; margin: 2px 0 5px; }
  .vocab-def { font-size: 14px; }
  .vocab-zh { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .quiz-item { margin-bottom: 22px; }
  .quiz-q { font-family: 'Nunito', sans-serif; font-weight: 700; margin-bottom: 12px; font-size: 15px; line-height: 1.5; }
  .quiz-options { display: grid; gap: 8px; }
  .quiz-option {
    background: #f8fbff;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    transition: all .15s;
    font-family: 'Nunito Sans', sans-serif;
  }
  .quiz-option:hover:not(:disabled) { border-color: var(--accent); background: #e8f4fd; }
  .quiz-option.correct { background: #eafaf1; border-color: var(--success); color: #1a5e35; }
  .quiz-option.wrong { background: #fdf2f2; border-color: #e74c3c; color: #7b1a1a; }
  .quiz-option:disabled { cursor: default; }
  .quiz-explanation {
    margin-top: 10px;
    padding: 14px 16px;
    background: #fef9e7;
    border-left: 4px solid #f39c12;
    border-radius: 0 8px 8px 0;
    font-size: 13.5px;
    display: none;
    line-height: 1.65;
  }
  .quiz-explanation.visible { display: block; }

  .score-banner {
    text-align: center; padding: 18px; border-radius: 10px; margin-bottom: 18px;
    font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800; display: none;
  }
  .score-banner.great { background: #eafaf1; color: #1e8449; border: 2px solid #a9dfbf; }
  .score-banner.ok { background: #fef9e7; color: #9a7d0a; border: 2px solid #f9e79f; }
  .score-banner.retry { background: #fdf2f2; color: #922b21; border: 2px solid #f5b7b1; }

  .action-bar { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

  .empty-state { text-align: center; padding: 70px 20px; color: var(--muted); }
  .empty-state .big-icon { font-size: 64px; margin-bottom: 14px; }
  .empty-state h2 { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
  .empty-state p { font-size: 15px; max-width: 300px; margin: 0 auto; }

  .toast {
    position: fixed; bottom: 22px; right: 22px;
    background: var(--ink); color: #fff; padding: 11px 18px;
    border-radius: 8px; font-size: 14px; font-family: 'Nunito', sans-serif;
    transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    .stats-bar { display: none; }
    .container { padding: 16px 12px 60px; }
    .section { padding: 16px 14px; }
    .article-header { padding: 16px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="level-badge">A2–B1</span>
    <h1>Guan's English Reader</h1>
  </div>
  <div class="stats-bar">
    <span>已讀 <strong id="h-count">0</strong> 篇</span>
    <span>答對率 <strong id="h-rate">—</strong></span>
  </div>
</header>

<div class="container">
  <div class="progress-section">
    <span class="progress-label">🌟 我的進度</span>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="progress-count" id="prog-count">0 篇</span>
  </div>

  <div class="controls">
    <button class="btn-primary" id="btn-generate" onclick="generateArticle()">✨ 產生新文章</button>
    <button class="btn-secondary" id="btn-toggle-zh" onclick="toggleTranslation()" disabled>🈶 看中文翻譯</button>
    <button class="btn-secondary" id="btn-download" onclick="downloadMD()" disabled>⬇ 下載</button>
  </div>

  <div class="loading-wrap" id="loading">
    <div class="spinner"></div>
    <p>正在幫你準備今天的文章，請等一下⋯ 🚀</p>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="big-icon">🚀</div>
    <h2>嗨，Guan！</h2>
    <p>按下「產生新文章」，開始今天的英文練習！</p>
  </div>

  <div id="article-area">
    <div class="article-header">
      <div class="article-meta">A2–B1 · 小六—國一 · <span id="art-date"></span></div>
      <div class="article-title" id="art-title"></div>
    </div>

    <div class="section" style="border-radius:0 0 12px 12px; border-top:none;">
      <div class="section-label">📰 English Article</div>
      <div id="art-body"></div>
    </div>

    <div class="translation-wrap" id="translation-wrap">
      <div class="section">
        <div class="section-label">🈶 中文翻譯</div>
        <div id="art-zh"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">📚 New Words</div>
      <div class="vocab-grid" id="vocab-grid"></div>
    </div>

    <div class="section">
      <div class="section-label">✏️ Quiz Time!</div>
      <div id="score-banner" class="score-banner"></div>
      <div id="quiz-container"></div>
      <div class="action-bar">
        <button class="btn-primary" id="btn-submit" onclick="submitQuiz()" disabled>✅ 提交答案</button>
      </div>
      <div id="next-bar" style="display:none; text-align:center; margin-top:32px; padding-bottom:24px;">
        <button onclick="generateArticle()" style="
          background: var(--accent);
          color: #fff;
          border: none;
          padding: 18px 48px;
          border-radius: 50px;
          font-size: 20px;
          font-family: 'Source Serif 4', serif;
          font-weight: 600;
          cursor: pointer;
          box-shadow: 0 4px 18px rgba(0,0,0,.18);
          letter-spacing: .5px;
          transition: transform .15s, box-shadow .15s;
          display: inline-flex;
          align-items: center;
          gap: 10px;
        " onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'">
          再讀一篇 &nbsp;→
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LEVEL_CONFIG = {
  storageKey: "flpt_guan",
  prompt: `You are a friendly English teacher creating an A2-to-B1 level reading passage for a Taiwanese student in Grade 6 transitioning to junior high school (age 12).

LEVEL REQUIREMENTS:
- Vocabulary: A2-B1 CEFR level, approximately GEPT Elementary to Intermediate
- Grammar: simple and compound sentences, basic tenses (present, past, future), simple modals
- Topics: fun and relatable — animals, nature, sports, school life, food, famous places, simple science facts
- Length: short engaging article of 150–180 words
- Style: friendly, encouraging, like a children's science magazine (like National Geographic Kids)
- Use simple vocabulary but introduce 6 slightly challenging words to learn

OUTPUT FORMAT (use these exact markers):
===TITLE===
[Fun, short title]
===ARTICLE===
[150-180 word English article, short paragraphs, friendly tone]
===TRANSLATION===
[Full Traditional Chinese translation, simple and natural for a 12-year-old]
===VOCAB===
[Exactly 6 vocabulary items, one per line: WORD|/IPA/|Simple English meaning|中文意思|Short example sentence]
===QUIZ===
Q1: [Simple comprehension question based on the article]
A) [Option A]
B) [Option B]
C) [Option C]
D) [Option D]
ANSWER: [A/B/C/D]
EXPLANATION_EN: [Simple English explanation, 1-2 sentences]
EXPLANATION_ZH: [Traditional Chinese explanation, 1-2 sentences, simple language for a 12-year-old]
Q2: [Another question, slightly more inference-based]
A) [Option A]
B) [Option B]
C) [Option C]
D) [Option D]
ANSWER: [A/B/C/D]
EXPLANATION_EN: [Simple English explanation]
EXPLANATION_ZH: [Traditional Chinese explanation]

Generate a fresh topic each time. Keep it fun and encouraging! All Chinese must be Traditional Chinese (正體中文).`
};

const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent`;
let state = JSON.parse(localStorage.getItem(LEVEL_CONFIG.storageKey) || '{"count":0,"totalQ":0,"correctQ":0}');
let currentData = null;
let userAnswers = {};
let quizSubmitted = false;

updateStats();

function saveState() { localStorage.setItem(LEVEL_CONFIG.storageKey, JSON.stringify(state)); }

function updateStats() {
  document.getElementById('h-count').textContent = state.count;
  const rate = state.totalQ > 0 ? Math.round(state.correctQ / state.totalQ * 100) + '%' : '—';
  document.getElementById('h-rate').textContent = rate;
  const pct = Math.min(state.count * 5, 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-count').textContent = state.count + ' 篇';
}

function getApiKey() {
  return 'AIzaSyBK4_XDO7FN0KVjSG1U3zcN26lUx3GStDU';
}

async function generateArticle() {
  const key = getApiKey();
  if (!key) return;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('article-area').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('btn-generate').disabled = true;
  document.getElementById('btn-toggle-zh').disabled = true;
  document.getElementById('btn-download').disabled = true;
  userAnswers = {}; quizSubmitted = false;

  try {
    const res = await fetch(`${API_URL}?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: LEVEL_CONFIG.prompt }] }],
        generationConfig: { maxOutputTokens: 3000, temperature: 0.9 }
      })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    currentData = parseResponse(raw);
    renderArticle(currentData);
    state.count++;
    saveState(); updateStats();
  } catch (e) {
    showToast('❌ 錯誤：' + e.message);
    document.getElementById('empty-state').style.display = 'block';
    if (e.message.includes('API key')) localStorage.removeItem('gemini_key');
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-generate').disabled = false;
  }
}

function parseResponse(raw) {
  const get = (tag) => { const m = raw.match(new RegExp(`===${tag}===\\s*([\\s\\S]*?)(?:===|$)`)); return m ? m[1].trim() : ''; };
  const vocab = get('VOCAB').split('\n').filter(l => l.includes('|')).map(line => {
    const [word, ipa, def, zh, ex] = line.split('|');
    return { word: word?.trim(), ipa: ipa?.trim(), def: def?.trim(), zh: zh?.trim(), ex: ex?.trim() };
  }).filter(v => v.word);
  const questions = [];
  get('QUIZ').split(/Q\d+:/).filter(b => b.trim()).forEach(block => {
    const lines = block.trim().split('\n').map(l => l.trim()).filter(Boolean);
    const q = { text: lines[0], options: {}, answer: '', expEn: '', expZh: '' };
    lines.forEach(l => {
      if (/^[A-D]\)/.test(l)) q.options[l[0]] = l.slice(2).trim();
      else if (l.startsWith('ANSWER:')) q.answer = l.replace('ANSWER:', '').trim();
      else if (l.startsWith('EXPLANATION_EN:')) q.expEn = l.replace('EXPLANATION_EN:', '').trim();
      else if (l.startsWith('EXPLANATION_ZH:')) q.expZh = l.replace('EXPLANATION_ZH:', '').trim();
    });
    if (q.text && q.answer) questions.push(q);
  });
  return { title: get('TITLE'), body: get('ARTICLE'), zh: get('TRANSLATION'), vocab, questions };
}

function renderArticle(d) {
  document.getElementById('art-title').textContent = d.title || "Today's Story";
  document.getElementById('art-date').textContent = new Date().toLocaleDateString('zh-TW');
  document.getElementById('art-body').innerHTML = d.body.split('\n\n').filter(Boolean).map(p => `<p>${p}</p>`).join('');
  document.getElementById('art-zh').innerHTML = d.zh.split('\n\n').filter(Boolean).map(p => `<p>${p}</p>`).join('');
  document.getElementById('translation-wrap').classList.remove('visible');
  document.getElementById('btn-toggle-zh').textContent = '🈶 看中文翻譯';
  document.getElementById('vocab-grid').innerHTML = d.vocab.map(v => `
    <div class="vocab-item">
      <div class="vocab-word">${v.word}</div>
      <div class="vocab-ipa">${v.ipa || ''}</div>
      <div class="vocab-def">${v.def || ''}</div>
      <div class="vocab-zh">📌 ${v.zh || ''}</div>
      ${v.ex ? `<div class="vocab-def" style="margin-top:5px;font-style:italic;color:#666">✦ ${v.ex}</div>` : ''}
    </div>`).join('');
  document.getElementById('quiz-container').innerHTML = d.questions.map((q, qi) => `
    <div class="quiz-item" id="qi-${qi}">
      <div class="quiz-q">Q${qi+1}. ${q.text}</div>
      <div class="quiz-options">
        ${Object.entries(q.options).map(([k, v]) => `<button class="quiz-option" id="opt-${qi}-${k}" onclick="selectOption(${qi},'${k}')">${k}) ${v}</button>`).join('')}
      </div>
      <div class="quiz-explanation" id="exp-${qi}">
        <strong>✅ Answer:</strong> ${q.expEn}<br><br>
        <strong>💡 解說：</strong> ${q.expZh}
      </div>
    </div>`).join('');
  document.getElementById('score-banner').style.display = 'none';
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('btn-submit').style.display = 'inline-block';
  document.getElementById('next-bar') && (document.getElementById('next-bar').style.display = 'none');
  document.getElementById('article-area').style.display = 'block';
  document.getElementById('btn-toggle-zh').disabled = false;
  document.getElementById('btn-download').disabled = false;
  document.getElementById('article-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function selectOption(qi, key) {
  if (quizSubmitted) return;
  userAnswers[qi] = key;
  document.querySelectorAll(`#qi-${qi} .quiz-option`).forEach(o => { o.style.borderColor = ''; o.style.background = ''; });
  const sel = document.getElementById(`opt-${qi}-${key}`);
  sel.style.borderColor = 'var(--accent)'; sel.style.background = '#e8f4fd';
  document.getElementById('btn-submit').disabled = !currentData.questions.every((_, i) => userAnswers[i]);
}

function submitQuiz() {
  if (!currentData || quizSubmitted) return;
  quizSubmitted = true;
  let correct = 0;
  currentData.questions.forEach((q, qi) => {
    const chosen = userAnswers[qi];
    const isCorrect = chosen === q.answer;
    if (isCorrect) correct++;
    Object.keys(q.options).forEach(k => {
      const btn = document.getElementById(`opt-${qi}-${k}`);
      btn.disabled = true; btn.style.borderColor = ''; btn.style.background = '';
      if (k === q.answer) btn.classList.add('correct');
      else if (k === chosen && !isCorrect) btn.classList.add('wrong');
    });
    document.getElementById(`exp-${qi}`).classList.add('visible');
  });
  state.totalQ += currentData.questions.length;
  state.correctQ += correct;
  saveState(); updateStats();
  const total = currentData.questions.length;
  const banner = document.getElementById('score-banner');
  banner.style.display = 'block';
  if (correct === total) { banner.className = 'score-banner great'; banner.textContent = `🎉 全對！好棒的 Guan！${correct}/${total}`; }
  else if (correct >= total / 2) { banner.className = 'score-banner ok'; banner.textContent = `👍 答對 ${correct}/${total}，很不錯喔！`; }
  else { banner.className = 'score-banner retry'; banner.textContent = `📖 答對 ${correct}/${total}，再看一遍吧！`; }
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('next-bar') && (document.getElementById('next-bar').style.display = 'block');
}

function toggleTranslation() {
  const wrap = document.getElementById('translation-wrap');
  const btn = document.getElementById('btn-toggle-zh');
  btn.textContent = wrap.classList.toggle('visible') ? '🈚 隱藏翻譯' : '🈶 看中文翻譯';
}

function downloadMD() {
  if (!currentData) return;
  const d = currentData;
  let md = `# ${d.title}\n\n> Level: A2-B1 | Guan's English Reader | ${new Date().toLocaleDateString('zh-TW')}\n\n## Article\n\n${d.body}\n\n## Translation\n\n${d.zh}\n\n## Vocabulary\n\n`;
  d.vocab.forEach(v => { md += `**${v.word}** ${v.ipa} — ${v.def} | ${v.zh}\n例：${v.ex}\n\n`; });
  md += `## Quiz\n\n`;
  d.questions.forEach((q, i) => {
    md += `**Q${i+1}.** ${q.text}\n`;
    Object.entries(q.options).forEach(([k, v]) => { md += `${k}) ${v}\n`; });
    md += `\nAnswer: ${q.answer}\n${q.expEn}\n${q.expZh}\n\n`;
  });
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `guan-reader-${new Date().toISOString().slice(0,10)}.md`;
  a.click();
  showToast('✅ 下載完成！');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
