<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guan's Fun English</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f0f7ff; --accent: #2980b9; --paper: #ffffff; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); text-align: center; padding: 20px; }
  .box { background: var(--paper); border-radius: 20px; padding: 30px; max-width: 600px; margin: 0 auto; box-shadow: 0 8px 0 #bcd; }
  .btn-fun { background: #ff9f43; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 20px; cursor: pointer; box-shadow: 0 5px 0 #e67e22; }
  .btn-fun:active { transform: translateY(3px); box-shadow: 0 2px 0 #e67e22; }
</style>
</head>
<body>
<div class="box">
  <h1 style="color: var(--accent);">🚀 Guan's Hero Reader</h1>
  <p style="margin-bottom: 20px;">想看什麼有趣的故事呢？</p>
  <button class="btn-fun" onclick="generateArticle()">✨ 變出新故事！</button>
  <div id="loading" style="display:none; margin-top: 20px;">🐣 故事正在孵化中...</div>
  <div id="story" style="margin-top: 30px; text-align: left; font-size: 18px;"></div>
</div>
<script>
function getApiKey() { return localStorage.getItem('gemini_api_key') || prompt("Guan，請輸入 API Key："); }

async function generateArticle() {
  const key = getApiKey(); if(!key) return;
  document.getElementById('loading').style.display = 'block';
  const prompt = "You are a funny English teacher for Guan (Age 12). Topic: Animals, Space, Sports. Level: A2-B1.";
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const d = await res.json();
    document.getElementById('story').innerText = d.candidates[0].content.parts[0].text;
    const s = JSON.parse(localStorage.getItem('flpt_guan') || '{"count":0,"totalQ":0,"correctQ":0}');
    s.count++; localStorage.setItem('flpt_guan', JSON.stringify(s));
  } finally { document.getElementById('loading').style.display = 'none'; }
}
</script>
</body>
</html>
