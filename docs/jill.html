<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jill's English Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #f8fcfb; --ink: #1a2a26; --accent: #16a085; --paper: #ffffff; }
  header { background: var(--accent); color: white; padding: 20px; text-align: center; }
  .container { max-width: 700px; margin: 30px auto; padding: 20px; }
  .btn-gen { background: var(--ink); color: white; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; border: none; font-size: 16px; }
</style>
</head>
<body>
<header><h1>Jill's Tech & News</h1></header>
<div class="container">
  <button class="btn-gen" onclick="generateArticle()">🚀 生成青少年科技時事文章</button>
  <div id="loading" style="display:none; margin-top: 20px;">🤖 AI 正在掃描最新時事...</div>
  <div id="output" style="margin-top: 30px; font-size: 18px; line-height: 1.8;"></div>
</div>
<script>
function getApiKey() { return localStorage.getItem('gemini_api_key') || prompt("請輸入 API Key："); }

async function generateArticle() {
  const key = getApiKey(); if(!key) return;
  document.getElementById('loading').style.display = 'block';
  const prompt = "You are an English teacher for Jill (Grade 10-12). Topic: Tech, Environment, Social Media. Level: B2.";
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const d = await res.json();
    document.getElementById('output').innerText = d.candidates[0].content.parts[0].text;
    const s = JSON.parse(localStorage.getItem('flpt_jill') || '{"count":0,"totalQ":0,"correctQ":0}');
    s.count++; localStorage.setItem('flpt_jill', JSON.stringify(s));
  } finally { document.getElementById('loading').style.display = 'none'; }
}
</script>
</body>
</html>
