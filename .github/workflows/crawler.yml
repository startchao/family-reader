name: Novel Finder Bot

on:
  # 手動觸發（從 GitHub Actions 頁面點 "Run workflow"）
  workflow_dispatch:
    inputs:
      lifetime:
        description: 'Bot 運行時間（秒），預設 1200 = 20 分鐘'
        required: false
        default: '1200'

permissions:
  contents: read

jobs:
  run-bot:
    name: Run Telegram Bot
    runs-on: ubuntu-latest
    # 設定 job 最長時間為 25 分鐘（比 BOT_LIFETIME_SECONDS 多 5 分鐘緩衝）
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: novel-finder/requirements.txt

      - name: Install dependencies
        run: pip install -r novel-finder/requirements.txt

      - name: Start Novel Finder Bot
        run: python novel-finder/src/main.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_LIFETIME_SECONDS: ${{ github.event.inputs.lifetime || '1200' }}
